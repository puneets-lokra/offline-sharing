<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a73e8" />
    <link rel="manifest" href="/dashboard/manifest.webmanifest" />
    <title>Clinic Dashboard</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, sans-serif; background: #f0f4f8; color: #1a1a2e; }
      header { background: #1a73e8; color: #fff; padding: 1rem 1.5rem; }
      header h1 { margin: 0; font-size: 1.4rem; }
      header p { margin: 0.2rem 0 0; font-size: 0.85rem; opacity: 0.85; }
      .connection-bar { display: flex; align-items: center; gap: 1rem; padding: 0.6rem 1.5rem; background: #fff; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
      .conn-btn { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
      .conn-btn--http { background: #34a853; color: #fff; }
      .conn-btn--ble  { background: #4285f4; color: #fff; }
      .conn-btn--qr   { background: #f57c00; color: #fff; }
      .conn-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .conn-status { font-size: 0.8rem; }
      .conn-status--ok    { color: #34a853; }
      .conn-status--error { color: #ea4335; }

      /* QR Panel */
      .qr-panel { background: #fff; border-bottom: 2px solid #f57c00; padding: 1.25rem 1.5rem; }
      .qr-panel-inner { max-width: 640px; }
      .qr-form-row { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; margin-bottom: 1.25rem; }
      .qr-field { display: flex; flex-direction: column; gap: 0.25rem; flex: 1; min-width: 140px; }
      .qr-field label { font-size: 0.75rem; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.04em; }
      .qr-field input { padding: 0.45rem 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; outline: none; }
      .qr-field input:focus { border-color: #f57c00; }
      .qr-generate-btn { padding: 0.45rem 1.25rem; background: #f57c00; color: #fff; border: none; border-radius: 4px; font-size: 0.9rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
      .qr-generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .qr-output { border-top: 1px solid #f0f0f0; padding-top: 1.25rem; }
      .qr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
      @media (max-width: 480px) { .qr-grid { grid-template-columns: 1fr; } }
      .qr-box { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; }
      .qr-step-label { font-size: 0.95rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
      .qr-step { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 0.8rem; font-weight: 700; color: #fff; }
      .qr-step--1 { background: #34a853; }
      .qr-step--2 { background: #1a73e8; }
      .qr-hint { font-size: 0.78rem; color: #555; text-align: center; line-height: 1.4; }
      .qr-url-box { font-size: 0.72rem; font-family: monospace; background: #f0f4f8; padding: 0.3rem 0.6rem; border-radius: 4px; color: #1a73e8; word-break: break-all; text-align: center; max-width: 240px; }
      .qr-instructions { font-size: 0.8rem; color: #666; margin-top: 1rem; line-height: 1.6; }
      .qr-print-btn { margin-top: 0.75rem; padding: 0.4rem 1rem; background: #555; color: #fff; border: none; border-radius: 4px; font-size: 0.85rem; cursor: pointer; }
      @media print { .connection-bar, .stats-bar, .qr-generate-btn, .qr-print-btn, header p { display: none !important; } }
      .stats-bar { display: flex; gap: 1.5rem; padding: 0.75rem 1.5rem; background: #e8f0fe; font-size: 0.85rem; flex-wrap: wrap; }
      .stat { display: flex; flex-direction: column; }
      .stat-val { font-size: 1.4rem; font-weight: 700; color: #1a73e8; }
      main { padding: 1rem 1.5rem; overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.1); font-size: 0.85rem; }
      th { background: #1a73e8; color: #fff; text-align: left; padding: 0.6rem 0.8rem; white-space: nowrap; }
      td { padding: 0.55rem 0.8rem; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
      tr:last-child td { border-bottom: none; }
      tr:nth-child(even) td { background: #f8faff; }
      .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
      .badge--pending { background: #fef3cd; color: #856404; }
      .badge--synced  { background: #d1f2eb; color: #0d6045; }
      .empty { text-align: center; padding: 2rem; color: #888; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
