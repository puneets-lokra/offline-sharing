<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/manifest.json" />
    <title>Clinic Records</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --blue: #2563eb;
        --blue-dark: #1d4ed8;
        --green: #16a34a;
        --red: #dc2626;
        --yellow: #d97706;
        --gray-50: #f9fafb;
        --gray-100: #f3f4f6;
        --gray-200: #e5e7eb;
        --gray-600: #4b5563;
        --gray-900: #111827;
        --radius: 8px;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--gray-50);
        color: var(--gray-900);
        min-height: 100vh;
      }

      #app { max-width: 860px; margin: 0 auto; padding: 0 16px 48px; }

      /* Header */
      header { padding: 24px 0 8px; }
      header h1 { font-size: 1.75rem; font-weight: 700; color: var(--blue); }
      .subtitle { color: var(--gray-600); font-size: 0.9rem; margin-top: 2px; }

      /* Sync status banner */
      .sync-status {
        display: flex; align-items: center; gap: 8px;
        padding: 10px 16px; border-radius: var(--radius);
        font-size: 0.875rem; margin: 12px 0;
        border: 1px solid var(--gray-200);
        background: white;
        transition: background 0.3s;
      }
      .sync-status--offline  { background: #fef2f2; border-color: #fecaca; }
      .sync-status--reachable { background: #f0fdf4; border-color: #bbf7d0; }
      .sync-status--syncing  { background: #eff6ff; border-color: #bfdbfe; }
      .sync-status--synced   { background: #f0fdf4; border-color: #bbf7d0; }
      .sync-status--error    { background: #fef2f2; border-color: #fecaca; }

      .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
      .dot-red    { background: var(--red); }
      .dot-green  { background: var(--green); }
      .dot-yellow { background: var(--yellow); }
      .dot-blue   { background: var(--blue); }

      /* Sections */
      .section { background: white; border-radius: var(--radius); border: 1px solid var(--gray-200); padding: 24px; margin-bottom: 20px; }

      /* Form */
      .record-form h2 { font-size: 1.1rem; margin-bottom: 16px; }
      .field { margin-bottom: 14px; }
      .field.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.04em; }
      input, select, textarea {
        width: 100%; padding: 9px 12px; border: 1px solid var(--gray-200);
        border-radius: 6px; font-size: 0.95rem; background: var(--gray-50);
        color: var(--gray-900); outline: none; transition: border-color 0.2s;
      }
      input:focus, select:focus, textarea:focus { border-color: var(--blue); background: white; }
      textarea { resize: vertical; }
      .btn-primary {
        display: inline-block; padding: 10px 24px;
        background: var(--blue); color: white; font-size: 0.95rem; font-weight: 600;
        border: none; border-radius: 6px; cursor: pointer; transition: background 0.2s;
        margin-top: 4px;
      }
      .btn-primary:hover { background: var(--blue-dark); }
      .btn-primary:disabled { background: var(--gray-200); color: var(--gray-600); cursor: not-allowed; }
      .form-note { font-size: 0.78rem; color: var(--gray-600); margin-top: 8px; }

      /* Record list */
      .record-list h2 { font-size: 1.1rem; margin-bottom: 14px; }
      .empty-state { color: var(--gray-600); font-size: 0.9rem; }
      .table-wrapper { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
      th { text-align: left; padding: 8px 10px; background: var(--gray-50); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--gray-600); border-bottom: 1px solid var(--gray-200); }
      td { padding: 9px 10px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
      tr:last-child td { border-bottom: none; }
      tr:hover td { background: var(--gray-50); }

      .badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
      .badge-synced  { background: #dcfce7; color: #166534; }
      .badge-pending { background: #fef9c3; color: #854d0e; }

      /* BLE transport bar */
      .ble-bar { display: flex; align-items: center; gap: 10px; padding: 10px 0; flex-wrap: wrap; }
      .ble-btn { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.875rem; font-weight: 600; background: #4285f4; color: #fff; transition: background 0.2s; }
      .ble-btn:hover:not(:disabled) { background: #1a73e8; }
      .ble-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .ble-status { font-size: 0.8rem; color: var(--gray-600); }
      .ble-status--connected { color: var(--green); font-weight: 600; }
      .ble-status--error     { color: var(--red); }

      /* Patient / QR mode */
      .doctor-banner { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #e8f0fe; border-radius: 6px; font-size: 0.875rem; color: #1a1a2e; margin-bottom: 14px; }
      .doctor-id-badge { background: #1a73e8; color: #fff; font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-left: 4px; }

      /* Wi-Fi QR section */
      .wifi-qr-section { margin: 0 0 12px; }
      .wifi-qr-details { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
      .wifi-qr-summary { padding: 10px 14px; cursor: pointer; font-size: 0.875rem; font-weight: 600; color: #1a2e1a; background: #f0fdf4; list-style: none; display: flex; align-items: center; gap: 6px; }
      .wifi-qr-summary::before { content: '📶'; }
      .wifi-qr-summary::-webkit-details-marker { display: none; }
      .wifi-qr-body { display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 8px; background: #fff; }
      .wifi-qr-hint { font-size: 0.8rem; color: var(--gray-600); text-align: center; margin: 0; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
